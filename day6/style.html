<!DOCTYPE html>
<html>
<head>
<style>

button {
    background-color: blue;
    color: white;
    padding: 15px 30px;
    border: none;

    transition: 2s;
}

button:hover {
    background-color: green;
    transform: scale(1.1);
}

</style>
</head>

<body>

<button>Hover Me</button>

</body>
</html>
