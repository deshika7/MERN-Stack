<!DOCTYPE html>
<html>
<head>

<style>

.box{
    width:100px;
    height:100px;
    background:rgb(218, 17, 232);

    animation: move 7s infinite;
}


@keyframes move{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(300px);
    }

}

</style>

</head>

<body>

<div class="box"></div>

</body>
</html>
