<!DOCTYPE html>
<html>
<head>
<title>CSS Multiple Animation Steps</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f2;

}
.box{
    width:100px;
    height:100px;
    background:red;
    border-radius:10px;
    animation: colorMove 5s infinite;
}

@keyframes colorMove{
    0%{
        background:red;
        transform:translateX(0px);

    }
    25%{
        background:yellow;
        transform:translateX(150px);

    }
    50%{
        background:green;
        transform:translateX(300px);

    }
    75%{
        background:orange;
        transform:translateX(150px);
    }
    100%{

        background:blue;
        transform:translateX(0px);
    }
}

</style>
</head>
<body>
<div class="box"></div>
</body>

</html>
