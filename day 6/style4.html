<!DOCTYPE html>
<html>
<head>
<title>CSS Transform Example</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:50px;

    background:#f2f2f2;

}

.box{

    width:100px;

    height:100px;

    background:blue;

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:20px;

    transition:1s;

}
.translate:hover{

    transform:translateX(150px);

}
.scale:hover{
    transform:scale(1.5);
}
.rotate:hover{
    transform:rotate(180deg);
}
</style>
</head>
<body>
<div class="box translate">
    Move
</div>
<div class="box scale">
    Scale
</div>
<div class="box rotate">
    Rotate
</div>
</body>
</html>
